version: '3.8'

services:
  xiaohongshu-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: xiaohongshu-agent
    ports:
      - "18060:18060"
      - "9090:9090"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - xiaohongshu-network

  redis:
    image: redis:7-alpine
    container_name: xiaohongshu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - xiaohongshu-network

networks:
  xiaohongshu-network:
    driver: bridge

volumes:
  redis-data:
